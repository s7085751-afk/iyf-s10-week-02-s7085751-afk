<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Sharleen Salma</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Me</h1>
        <fieldset>
            <legend>Send a Message</legend>
            <form action="#">
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" required placeholder="Your Name"><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required placeholder="email@example.com"><br><br>

                <label for="subject">Subject:</label><br>
                <select id="subject" name="subject">
                    <option value="general">General Inquiry</option>
                    <option value="project">Project Collaboration</option>
                    <option value="other">Other</option>
                </select><br><br>

                <label for="message">Message (min 50 chars):</label><br>
                <textarea id="message" name="message" required minlength="50" rows="5" placeholder="Write your message here..."></textarea><br><br>

                <label>
                    <input type="checkbox" name="newsletter"> Subscribe to my newsletter
                </label><br><br>

                <button type="submit">Submit Form</button>
            </form>
        </fieldset>
    </main>
</body>
</html>
